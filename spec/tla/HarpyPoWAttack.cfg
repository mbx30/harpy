\* Attack configuration: the adversary can out-mine the honest chain past the
\* confirmation depth (a k-deep commit happens at honest height k+1, so a
\* private fork from genesis needs k+2 blocks). Expect: TLC reports a
\* CommittedStable violation whose trace is the textbook double-spend —
\* commit at depth k, then a longer private fork orphans the committed block.
CONSTANTS
  MaxHonestBlocks = 3
  MaxAdvBlocks = 4
  ConfirmDepth = 2
SPECIFICATION Spec
INVARIANTS
  TypeOK
  CommittedStable
CHECK_DEADLOCK FALSE
