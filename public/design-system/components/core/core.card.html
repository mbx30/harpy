<body style="margin:0;padding:20px;background:var(--surface-page);">
<div id="root"></div>
<script type="text/babel">
const { Button, IconButton, Icon, Badge, Tag, Card, Callout, Spinner } = window.HarpyDesignSystem_94e4a2;

function Demo() {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>

        <Button variant="danger">Delete chain</Button>
        <Button variant="primary" disabled>Mining…</Button>
        <IconButton aria-label="Settings"><Icon name="settings" size={16} /></IconButton>
        <IconButton variant="outline" aria-label="Copy"><Icon name="copy" size={16} /></IconButton>
        <Spinner size={16} />

      <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
        <Badge variant="success" dot>Valid</Badge>
        <Badge variant="accent">Genesis</Badge>
        <Badge>Pending</Badge>
        <Badge variant="error" dot>Invalid</Badge>
        <Badge variant="info">Tutorial</Badge>

      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
            <span style={{ fontSize: "var(--text-md)", fontWeight: 600 }}>Block #12</span>

        <Callout variant="error" title="Invalid block">Hash does not meet difficulty.</Callout>
