<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<style>.hp-dialog, .hp-toast { animation: none; }</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script>window.HARPY_ICON_BASE = "../../assets/icons";</script>
</head>
<body style="margin:0;padding:20px;background:var(--surface-page);">
<div id="root"></div>
<script type="text/babel">
const { Dialog, Tooltip, Toast, Button, IconButton, Icon, Card } = window.HarpyDesignSystem_94e4a2;

function Demo() {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <div style={{ position: "relative", height: 190 }}>
        <Card variant="sunken" style={{ position: "absolute", inset: 0 }}></Card>
        <div className="hp-dialog" role="dialog" aria-label="Delete chain" style={{ position: "absolute", left: "50%", top: "50%", transform: "translate(-50%,-50%)", maxWidth: 380 }}>
          <div className="hp-dialog__head">
            <h2 className="hp-dialog__title">Delete chain</h2>
            <IconButton size="sm" aria-label="Close"><Icon name="x" size={16} /></IconButton>
          </div>
          <div className="hp-dialog__body">This removes all 12 blocks. It cannot be undone.</div>
          <div className="hp-dialog__foot">
            <Button variant="ghost">Cancel</Button>
            <Button variant="danger">Delete</Button>
          </div>
        </div>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 16, flexWrap: "wrap" }}>
        <Toast variant="success" onDismiss={() => {}}>Block mined.</Toast>
        <Toast variant="error">Invalid: hash does not meet difficulty.</Toast>
        <Tooltip label="Copy hash">
          <IconButton variant="outline" aria-label="Copy hash"><Icon name="copy" size={16} /></IconButton>
        </Tooltip>
      </div>
    </div>
  );
}
// Force Dialog CSS registration for the inline dialog demo above.
ReactDOM.createRoot(document.createElement("div")).render(<Dialog open title="x" />);
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
