<!-- @dsCard group="Spacing" viewport="700x190" subtitle="4px grid, 2–64px" name="Spacing scale" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:16px 20px;background:var(--surface-card);">
<div style="display:flex;align-items:flex-end;gap:14px;">
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:var(--space-05);height:var(--space-05);background:var(--sun-400);border-radius:1px;"></div><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">2</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:var(--space-1);height:var(--space-1);background:var(--sun-400);border-radius:1px;"></div><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">4</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:var(--space-15);height:var(--space-15);background:var(--sun-400);border-radius:1px;"></div><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">6</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:var(--space-2);height:var(--space-2);background:var(--sun-400);border-radius:2px;"></div><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">8</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:var(--space-3);height:var(--space-3);background:var(--sun-400);border-radius:2px;"></div><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">12</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:var(--space-4);height:var(--space-4);background:var(--sun-400);border-radius:3px;"></div><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">16</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:var(--space-5);height:var(--space-5);background:var(--sun-400);border-radius:3px;"></div><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">20</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:var(--space-6);height:var(--space-6);background:var(--sun-400);border-radius:4px;"></div><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">24</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:var(--space-8);height:var(--space-8);background:var(--sun-400);border-radius:4px;"></div><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">32</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:var(--space-10);height:var(--space-10);background:var(--sun-400);border-radius:5px;"></div><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">40</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:var(--space-12);height:var(--space-12);background:var(--sun-400);border-radius:6px;"></div><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">48</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:var(--space-16);height:var(--space-16);background:var(--sun-400);border-radius:6px;"></div><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">64</span></div>
</div>
</body></html>
