<!-- @dsCard group="Type" viewport="700x150" subtitle="Hashes, nonces, timestamps — how chain data renders" name="Data in mono" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:16px;background:var(--surface-card);">
<div style="background:var(--surface-sunken);border-radius:var(--radius-md);padding:14px 16px;display:grid;grid-template-columns:auto 1fr;gap:6px 24px;align-items:baseline;">
  <span style="font-size:11px;letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-muted);font-weight:500;">Hash</span>
  <span style="font-family:var(--font-mono);font-size:13px;color:var(--text-body);">000a4f2c81d6e37b…44f19c2e</span>
  <span style="font-size:11px;letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-muted);font-weight:500;">Nonce</span>
  <span style="font-family:var(--font-mono);font-size:13px;color:var(--text-body);">48213</span>
  <span style="font-size:11px;letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-muted);font-weight:500;">Timestamp</span>
  <span style="font-family:var(--font-mono);font-size:13px;color:var(--text-secondary);">2026-07-01T09:41:00Z</span>
</div>
</body></html>
