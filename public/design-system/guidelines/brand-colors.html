<!-- @dsCard group="Colors" viewport="700x150" subtitle="Charcoal, amber, paper — the three brand colors from the logo" name="Brand colors" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:16px;background:var(--surface-card);">
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;height:118px;">
  <div style="background:var(--ink-900);border-radius:var(--radius-lg);padding:14px;display:flex;flex-direction:column;justify-content:flex-end;">
    <div style="color:#fff;font-weight:600;font-size:13px;">Charcoal</div>
    <div style="color:var(--ink-400);font-family:var(--font-mono);font-size:11px;">--ink-900 · #2C2C2B</div>
  </div>
  <div style="background:var(--sun-400);border-radius:var(--radius-lg);padding:14px;display:flex;flex-direction:column;justify-content:flex-end;">
    <div style="color:var(--ink-900);font-weight:600;font-size:13px;">Amber</div>
    <div style="color:var(--sun-800);font-family:var(--font-mono);font-size:11px;">--sun-400 · #E8A33D</div>
  </div>
  <div style="background:var(--ink-50);border:1px solid var(--border-default);border-radius:var(--radius-lg);padding:14px;display:flex;flex-direction:column;justify-content:flex-end;">
    <div style="color:var(--text-body);font-weight:600;font-size:13px;">Paper</div>
    <div style="color:var(--text-muted);font-family:var(--font-mono);font-size:11px;">--ink-50 · #FAF9F7</div>
  </div>
</div>
</body></html>
