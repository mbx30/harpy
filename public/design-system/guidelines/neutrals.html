<!-- @dsCard group="Colors" viewport="700x140" subtitle="Warm-gray ink ramp, paper to near-black" name="Neutrals" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:16px;background:var(--surface-card);">
<div style="display:grid;grid-template-columns:repeat(12,1fr);gap:4px;">
  <div style="height:64px;border-radius:4px;background:var(--ink-0);border:1px solid var(--border-default);"></div>
  <div style="height:64px;border-radius:4px;background:var(--ink-50);"></div>
  <div style="height:64px;border-radius:4px;background:var(--ink-100);"></div>
  <div style="height:64px;border-radius:4px;background:var(--ink-200);"></div>
  <div style="height:64px;border-radius:4px;background:var(--ink-300);"></div>
  <div style="height:64px;border-radius:4px;background:var(--ink-400);"></div>
  <div style="height:64px;border-radius:4px;background:var(--ink-500);"></div>
  <div style="height:64px;border-radius:4px;background:var(--ink-600);"></div>
  <div style="height:64px;border-radius:4px;background:var(--ink-700);"></div>
  <div style="height:64px;border-radius:4px;background:var(--ink-800);"></div>
  <div style="height:64px;border-radius:4px;background:var(--ink-900);"></div>
  <div style="height:64px;border-radius:4px;background:var(--ink-950);"></div>
</div>
<div style="display:flex;justify-content:space-between;margin-top:8px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);">
  <span>--ink-0</span><span>--ink-500</span><span>--ink-950</span>
</div>
</body></html>
