<!-- @dsCard group="Brand" viewport="700x200" subtitle="Quiet, confident, precise — say less" name="Voice" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:20px;background:var(--surface-card);">
<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
  <div>
    <div style="font-size:11px;letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--status-success-text);font-weight:500;margin-bottom:10px;">Say</div>
    <div style="display:flex;flex-direction:column;gap:8px;font-size:14px;color:var(--text-body);">
      <span>Block mined.</span>
      <span>Invalid: hash does not meet difficulty.</span>
      <span>Nothing here yet. Mine the first block.</span>
    </div>
  </div>
  <div>
    <div style="font-size:11px;letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--status-error-text);font-weight:500;margin-bottom:10px;">Not</div>
    <div style="display:flex;flex-direction:column;gap:8px;font-size:14px;color:var(--text-muted);text-decoration:line-through;">
      <span>Awesome! Your block was mined successfully! 🎉</span>
      <span>Oops! Something went wrong…</span>
      <span>Welcome to your blockchain journey!</span>
    </div>
  </div>
</div>
</body></html>
