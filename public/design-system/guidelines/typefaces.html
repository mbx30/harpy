<!-- @dsCard group="Type" viewport="700x180" subtitle="Geist + Geist Mono, variable — substituted for unsupplied brand fonts" name="Typefaces" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:20px;background:var(--surface-card);">
<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start;">
  <div>
    <div style="font-size:11px;letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-muted);font-weight:500;">Geist</div>
    <div style="font-size:34px;font-weight:600;letter-spacing:var(--tracking-display);line-height:1.15;margin-top:8px;color:var(--text-body);">Silence, then proof.</div>
    <div style="font-size:13px;color:var(--text-secondary);margin-top:8px;">Aa Bb Cc 0123456789 — weights 400 / 500 / 600</div>
  </div>
  <div>
    <div style="font-size:11px;letter-spacing:var(--tracking-caps);text-transform:uppercase;color:var(--text-muted);font-weight:500;">Geist Mono</div>
    <div style="font-family:var(--font-mono);font-size:20px;margin-top:12px;color:var(--text-body);">000a4f…9c2e</div>
    <div style="font-family:var(--font-mono);font-size:13px;color:var(--text-secondary);margin-top:10px;">hash · nonce · timestamp — all data is mono</div>
  </div>
</div>
</body></html>
