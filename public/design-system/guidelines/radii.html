<!-- @dsCard group="Spacing" viewport="700x150" subtitle="4 / 6 / 10 / pill — pills echo the logo pillars" name="Corner radii" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:16px;background:var(--surface-card);">
<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;">
  <div style="border:1px solid var(--border-strong);border-radius:var(--radius-sm);height:72px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;">
    <span style="font-size:13px;font-weight:500;">sm</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">4px · chips</span>
  </div>
  <div style="border:1px solid var(--border-strong);border-radius:var(--radius-md);height:72px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;">
    <span style="font-size:13px;font-weight:500;">md</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">6px · controls</span>
  </div>
  <div style="border:1px solid var(--border-strong);border-radius:var(--radius-lg);height:72px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;">
    <span style="font-size:13px;font-weight:500;">lg</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">10px · cards</span>
  </div>
  <div style="border:1px solid var(--border-strong);border-radius:var(--radius-pill);height:72px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;">
    <span style="font-size:13px;font-weight:500;">pill</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">badges · tags</span>
  </div>
</div>
</body></html>
