<!-- @dsCard group="Colors" viewport="700x150" subtitle="Muted status hues — quiet enough to sit beside amber" name="Status colors" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:16px;background:var(--surface-card);">
<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;">
  <div style="background:var(--status-success-bg);border-radius:var(--radius-md);padding:12px;">
    <div style="width:12px;height:12px;border-radius:50%;background:var(--status-success);margin-bottom:20px;"></div>
    <div style="font-size:13px;font-weight:600;color:var(--status-success-text);">Success</div>
    <div style="font-family:var(--font-mono);font-size:10px;color:var(--status-success-text);opacity:.75;">#4C8A5C</div>
  </div>
  <div style="background:var(--status-error-bg);border-radius:var(--radius-md);padding:12px;">
    <div style="width:12px;height:12px;border-radius:50%;background:var(--status-error);margin-bottom:20px;"></div>
    <div style="font-size:13px;font-weight:600;color:var(--status-error-text);">Error</div>
    <div style="font-family:var(--font-mono);font-size:10px;color:var(--status-error-text);opacity:.75;">#C4553D</div>
  </div>
  <div style="background:var(--status-warning-bg);border-radius:var(--radius-md);padding:12px;">
    <div style="width:12px;height:12px;border-radius:50%;background:var(--status-warning);margin-bottom:20px;"></div>
    <div style="font-size:13px;font-weight:600;color:var(--status-warning-text);">Warning</div>
    <div style="font-family:var(--font-mono);font-size:10px;color:var(--status-warning-text);opacity:.75;">#D18B22</div>
  </div>
  <div style="background:var(--status-info-bg);border-radius:var(--radius-md);padding:12px;">
    <div style="width:12px;height:12px;border-radius:50%;background:var(--status-info);margin-bottom:20px;"></div>
    <div style="font-size:13px;font-weight:600;color:var(--status-info-text);">Info</div>
    <div style="font-family:var(--font-mono);font-size:10px;color:var(--status-info-text);opacity:.75;">#4A7296</div>
  </div>
</div>
</body></html>
