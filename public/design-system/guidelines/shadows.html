<!-- @dsCard group="Spacing" viewport="700x170" subtitle="Soft warm-black shadows; borders do most of the work" name="Shadows" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:20px;background:var(--surface-page);">
<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:16px;">
  <div style="background:var(--surface-card);border:1px solid var(--border-default);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);height:90px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;">
    <span style="font-size:13px;font-weight:500;">sm</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">cards</span>
  </div>
  <div style="background:var(--surface-card);border:1px solid var(--border-default);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);height:90px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;">
    <span style="font-size:13px;font-weight:500;">md</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">hover</span>
  </div>
  <div style="background:var(--surface-card);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);height:90px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;">
    <span style="font-size:13px;font-weight:500;">lg</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">popovers</span>
  </div>
  <div style="background:var(--surface-card);border-radius:var(--radius-lg);box-shadow:var(--shadow-overlay);height:90px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;">
    <span style="font-size:13px;font-weight:500;">overlay</span><span style="font-family:var(--font-mono);font-size:10px;color:var(--text-muted);">dialogs</span>
  </div>
</div>
</body></html>
