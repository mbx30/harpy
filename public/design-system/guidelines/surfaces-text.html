<!-- @dsCard group="Colors" viewport="700x170" subtitle="Semantic aliases in use — page, card, inverse" name="Surfaces & text" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:16px;background:var(--surface-page);">
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
  <div style="background:var(--surface-card);border:1px solid var(--border-default);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);padding:16px;">
    <div style="font-size:14px;font-weight:600;color:var(--text-body);letter-spacing:var(--tracking-heading);">Card on page</div>
    <div style="font-size:13px;color:var(--text-secondary);margin-top:4px;">Secondary text explains quietly.</div>
    <div style="font-size:11px;color:var(--text-muted);margin-top:8px;font-family:var(--font-mono);">--surface-card · --border-default</div>
  </div>
  <div style="background:var(--surface-inverse);border-radius:var(--radius-lg);padding:16px;">
    <div style="font-size:14px;font-weight:600;color:var(--text-inverse);letter-spacing:var(--tracking-heading);">Inverse surface</div>
    <div style="font-size:13px;color:var(--ink-400);margin-top:4px;">For footers and hero moments.</div>
    <div style="font-size:11px;color:var(--sun-400);margin-top:8px;font-family:var(--font-mono);">--surface-inverse</div>
  </div>
</div>
</body></html>
