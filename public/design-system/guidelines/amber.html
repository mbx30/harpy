<!-- @dsCard group="Colors" viewport="700x140" subtitle="Sun ramp — the single accent hue" name="Amber" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;padding:16px;background:var(--surface-card);">
<div style="display:grid;grid-template-columns:repeat(10,1fr);gap:4px;">
  <div style="height:64px;border-radius:4px;background:var(--sun-50);"></div>
  <div style="height:64px;border-radius:4px;background:var(--sun-100);"></div>
  <div style="height:64px;border-radius:4px;background:var(--sun-200);"></div>
  <div style="height:64px;border-radius:4px;background:var(--sun-300);"></div>
  <div style="height:64px;border-radius:4px;background:var(--sun-400);outline:2px solid var(--ink-900);outline-offset:-2px;"></div>
  <div style="height:64px;border-radius:4px;background:var(--sun-500);"></div>
  <div style="height:64px;border-radius:4px;background:var(--sun-600);"></div>
  <div style="height:64px;border-radius:4px;background:var(--sun-700);"></div>
  <div style="height:64px;border-radius:4px;background:var(--sun-800);"></div>
  <div style="height:64px;border-radius:4px;background:var(--sun-900);"></div>
</div>
<div style="display:flex;justify-content:space-between;margin-top:8px;font-family:var(--font-mono);font-size:11px;color:var(--text-muted);">
  <span>--sun-50</span><span>--sun-400 · brand</span><span>--sun-900</span>
</div>
</body></html>
